<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Upload System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            max-width: 800px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }
        
        .auth-section {
            margin-bottom: 30px;
        }
        
        .auth-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .auth-form input {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            flex: 1;
            min-width: 150px;
        }
        
        .auth-form input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #2ecc71;
            color: white;
        }
        
        .btn-success:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #95a5a6;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }
        
        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .user-info.active {
            display: flex;
        }
        
        .upload-section {
            margin: 20px 0;
            padding: 20px;
            border: 2px dashed #d0d0d0;
            border-radius: 10px;
            text-align: center;
        }
        
        .upload-section input[type="file"] {
            display: none;
        }
        
        .upload-label {
            display: inline-block;
            padding: 15px 30px;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-label:hover {
            background: #e0e0e0;
            transform: scale(1.02);
        }
        
        .upload-label i {
            margin-right: 10px;
        }
        
        .file-input-container {
            margin: 15px 0;
        }
        
        .upload-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        
        .files-section {
            margin-top: 30px;
        }
        
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .file-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid #e0e0e0;
        }
        
        .file-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .file-card img,
        .file-card video {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 10px;
            max-height: 150px;
            object-fit: cover;
        }
        
        .file-card .file-name {
            font-weight: 600;
            font-size: 14px;
            margin: 10px 0 5px;
            word-break: break-all;
        }
        
        .file-card .file-size {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .file-card .file-actions {
            display: flex;
            gap: 5px;
            justify-content: center;
        }
        
        .file-card .file-actions .btn {
            padding: 5px 10px;
            font-size: 11px;
        }
        
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        
        .status.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.info {
            display: block;
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-card .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-card .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .auth-toggle {
            text-align: center;
            margin-top: 10px;
        }
        
        .auth-toggle a {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            .auth-form {
                flex-direction: column;
            }
            
            .auth-form input {
                width: 100%;
            }
            
            .files-grid {
                grid-template-columns: 1fr;
            }
            
            .user-info {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 File Upload System</h1>
        
        <!-- Status Messages -->
        <div id="status" class="status"></div>
        
        <!-- User Info -->
        <div id="userInfo" class="user-info">
            <div>
                <strong>👤 <span id="usernameDisplay"></span></strong>
                <span id="userStats" style="margin-left: 15px; color: #666;"></span>
            </div>
            <button onclick="logout()" class="btn btn-danger">Logout</button>
        </div>
        
        <!-- Auth Section -->
        <div id="authSection" class="auth-section">
            <div id="loginForm" class="auth-form">
                <input type="text" id="loginUsername" placeholder="Username" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button onclick="login()" class="btn btn-primary">Login</button>
            </div>
            <div class="auth-toggle">
                <a onclick="toggleAuth()">Don't have an account? Register</a>
            </div>
            <div id="registerForm" class="auth-form" style="display: none; margin-top: 10px;">
                <input type="text" id="registerUsername" placeholder="Username" required>
                <input type="email" id="registerEmail" placeholder="Email (optional)">
                <input type="password" id="registerPassword" placeholder="Password (min 6 chars)" required>
                <button onclick="register()" class="btn btn-success">Register</button>
            </div>
            <div class="auth-toggle">
                <a onclick="toggleAuth()">Already have an account? Login</a>
            </div>
        </div>
        
        <!-- Upload Section -->
        <div id="uploadSection" style="display: none;">
            <div class="upload-section">
                <h3>Upload Files</h3>
                <div class="file-input-container">
                    <input type="file" id="fileInput" accept="image/*,video/*" multiple>
                    <label for="fileInput" class="upload-label">
                        📎 Choose Images & Videos
                    </label>
                </div>
                <div id="selectedFiles"></div>
                <div class="upload-actions">
                    <button onclick="uploadFiles()" class="btn btn-primary">Upload Files</button>
                </div>
            </div>
            
            <!-- Stats -->
            <div id="statsSection" class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalFiles">0</div>
                    <div class="stat-label">Total Files</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="storageUsed">0 MB</div>
                    <div class="stat-label">Storage Used</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="imageCount">0</div>
                    <div class="stat-label">Images</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="videoCount">0</div>
                    <div class="stat-label">Videos</div>
                </div>
            </div>
            
            <!-- Filter Buttons -->
            <div class="filter-buttons">
                <button onclick="loadFiles('all')" class="btn btn-secondary">All Files</button>
                <button onclick="loadFiles('image')" class="btn btn-primary">📷 Images</button>
                <button onclick="loadFiles('video')" class="btn btn-success">🎬 Videos</button>
            </div>
            
            <!-- Files Section -->
            <div id="filesSection" class="files-section">
                <h3>Your Files</h3>
                <div id="filesContainer">
                    <div class="loading">Loading files...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentFilter = 'all';

        // Show status message
        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            setTimeout(() => {
                status.className = 'status';
            }, 5000);
        }

        // Toggle login/register
        function toggleAuth() {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const toggleLinks = document.querySelectorAll('.auth-toggle a');
            
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'flex';
                registerForm.style.display = 'none';
                toggleLinks[0].textContent = "Don't have an account? Register";
                toggleLinks[1].textContent = "Already have an account? Login";
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'flex';
                toggleLinks[0].textContent = "Already have an account? Login";
                toggleLinks[1].textContent = "Don't have an account? Register";
            }
        }

        // Register user
        async function register() {
            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;

            if (!username || !password) {
                showStatus('Please fill in all required fields', 'error');
                return;
            }

            if (password.length < 6) {
                showStatus('Password must be at least 6 characters', 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email })
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('Registration successful! Please login.', 'success');
                    document.getElementById('registerUsername').value = '';
                    document.getElementById('registerEmail').value = '';
                    document.getElementById('registerPassword').value = '';
                    toggleAuth(); // Switch to login form
                } else {
                    showStatus(data.error || 'Registration failed', 'error');
                }
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            }
        }

        // Login user
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showStatus('Please enter username and password', 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    currentUser = data.user;
                    document.getElementById('usernameDisplay').textContent = currentUser.username;
                    document.getElementById('userInfo').classList.add('active');
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('uploadSection').style.display = 'block';
                    
                    showStatus('Welcome back, ' + currentUser.username + '!', 'success');
                    await loadStats();
                    await loadFiles('all');
                } else {
                    showStatus(data.error || 'Login failed', 'error');
                }
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            }
        }

        // Logout user
        async function logout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
                currentUser = null;
                document.getElementById('userInfo').classList.remove('active');
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('uploadSection').style.display = 'none';
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
                showStatus('Logged out successfully', 'info');
            } catch (error) {
                showStatus('Error logging out: ' + error.message, 'error');
            }
        }

        // Upload files
        async function uploadFiles() {
            const fileInput = document.getElementById('fileInput');
            const files = fileInput.files;

            if (files.length === 0) {
                showStatus('Please select files to upload', 'error');
                return;
            }

            if (!currentUser) {
                showStatus('Please login first', 'error');
                return;
            }

            const formData = new FormData();
            for (let file of files) {
                formData.append('file', file);
            }

            try {
                showStatus('Uploading files...', 'info');
                
                for (let file of files) {
                    const singleFormData = new FormData();
                    singleFormData.append('file', file);
                    
                    const response = await fetch('/api/upload', {
                        method: 'POST',
                        body: singleFormData
                    });

                    const data = await response.json();

                    if (!data.success) {
                        showStatus('Error uploading ' + file.name + ': ' + data.error, 'error');
                    }
                }

                showStatus('Files uploaded successfully!', 'success');
                fileInput.value = '';
                document.getElementById('selectedFiles').innerHTML = '';
                await loadStats();
                await loadFiles(currentFilter);
            } catch (error) {
                showStatus('Error uploading files: ' + error.message, 'error');
            }
        }

        // Load user files
        async function loadFiles(filter = 'all') {
            currentFilter = filter;
            const container = document.getElementById('filesContainer');
            
            try {
                let url = '/api/files';
                if (filter !== 'all') {
                    url += '/' + filter;
                }

                const response = await fetch(url);
                const data = await response.json();

                if (!data.success) {
                    container.innerHTML = `<div class="loading">Error loading files: ${data.error}</div>`;
                    return;
                }

                if (data.files.length === 0) {
                    container.innerHTML = `<div class="loading">No files found. Upload some files!</div>`;
                    return;
                }

                let html = '<div class="files-grid">';
                data.files.forEach(file => {
                    const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
                    let preview = '';
                    let typeLabel = '';
                    
                    if (file.type === 'image') {
                        preview = `<img src="${file.downloadURL}" alt="${file.name}" loading="lazy">`;
                        typeLabel = '📷';
                    } else if (file.type === 'video') {
                        preview = `<video controls>
                            <source src="${file.downloadURL}" type="${file.mimeType}">
                        </video>`;
                        typeLabel = '🎬';
                    }

                    html += `
                        <div class="file-card">
                            ${preview}
                            <div class="file-name">${typeLabel} ${file.name}</div>
                            <div class="file-size">${sizeMB} MB</div>
                            <div class="file-actions">
                                <a href="${file.downloadURL}" target="_blank" class="btn btn-primary" style="padding:5px 10px; font-size:11px;">View</a>
                                <button onclick="deleteFile('${file.id}')" class="btn btn-danger" style="padding:5px 10px; font-size:11px;">Delete</button>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `<div class="loading">Error: ${error.message}</div>`;
            }
        }

        // Delete file
        async function deleteFile(fileId) {
            if (!confirm('Are you sure you want to delete this file?')) return;

            try {
                const response = await fetch(`/api/files/${fileId}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('File deleted successfully!', 'success');
                    await loadStats();
                    await loadFiles(currentFilter);
                } else {
                    showStatus('Error deleting file: ' + data.error, 'error');
                }
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            }
        }

        // Load user statistics
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                if (data.success) {
                    const stats = data.stats;
                    document.getElementById('totalFiles').textContent = stats.totalFiles || 0;
                    
                    const storageMB = ((stats.storageUsed || 0) / (1024 * 1024)).toFixed(2);
                    document.getElementById('storageUsed').textContent = storageMB + ' MB';

                    // Load file counts by type
                    const imageResponse = await fetch('/api/files/image');
                    const imageData = await imageResponse.json();
                    document.getElementById('imageCount').textContent = imageData.success ? imageData.files.length : 0;

                    const videoResponse = await fetch('/api/files/video');
                    const videoData = await videoResponse.json();
                    document.getElementById('videoCount').textContent = videoData.success ? videoData.files.length : 0;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // File input change handler
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = e.target.files;
            const selectedDiv = document.getElementById('selectedFiles');
            
            if (files.length === 0) {
                selectedDiv.innerHTML = '';
                return;
            }

            let html = '<p><strong>Selected files:</strong></p><ul>';
            for (let file of files) {
                const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
                const type = file.type.startsWith('image/') ? '📷' : '🎬';
                html += `<li>${type} ${file.name} (${sizeMB} MB)</li>`;
            }
            html += '</ul>';
            selectedDiv.innerHTML = html;
        });

        // Auto-login check on page load
        async function checkSession() {
            try {
                const response = await fetch('/api/session');
                const data = await response.json();
                
                if (data.authenticated) {
                    // User is already logged in
                    document.getElementById('usernameDisplay').textContent = data.username;
                    document.getElementById('userInfo').classList.add('active');
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('uploadSection').style.display = 'block';
                    
                    // Load user data
                    await loadStats();
                    await loadFiles('all');
                }
            } catch (error) {
                console.error('Session check error:', error);
            }
        }

        // Initialize
        checkSession();

        // Demo credentials hint
        console.log('Demo credentials: demo / demo123');
    </script>
</body>
</html>
